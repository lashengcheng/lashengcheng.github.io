<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  {% feed_meta %}
  {% seo %}
  <style>
    :root {
      --bg: #050510;
      --bg2: #0a0a20;
      --card: rgba(10,10,40,0.7);
      --border: rgba(0,255,196,0.15);
      --text: #e0e0ff;
      --muted: #8892b0;
      --accent: #00ffc4;
      --accent2: #6c5ce7;
      --accent3: #fd79a8;
      --glow: 0 0 20px rgba(0,255,196,0.3), 0 0 60px rgba(0,255,196,0.1);
      --glow-pink: 0 0 20px rgba(253,121,168,0.3), 0 0 60px rgba(253,121,168,0.1);
      --radius: 12px;
      --max-w: 860px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.8; min-height: 100vh; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0;
      background: 
        radial-gradient(ellipse at 20% 50%, rgba(108,92,231,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(0,255,196,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(253,121,168,0.06) 0%, transparent 50%);
      pointer-events: none;
    }
    /* Grid overlay */
    body::after {
      content: ''; position: fixed; inset: 0; z-index: 0;
      background-image: linear-gradient(rgba(0,255,196,0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,255,196,0.03) 1px, transparent 1px);
      background-size: 60px 60px; pointer-events: none;
    }

    .container { max-width: var(--max-w); margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

    /* Nav */
    nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 24px 0; border-bottom: 1px solid var(--border); flex-wrap: wrap;
      backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 10;
      background: rgba(5,5,16,0.85);
    }
    nav .logo {
      font-size: 1.3rem; font-weight: 800; text-decoration: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    nav .links { display: flex; gap: 28px; }
    nav .links a {
      color: var(--muted); text-decoration: none; font-size: 0.93rem;
      transition: all 0.3s; position: relative;
    }
    nav .links a:hover { color: var(--accent); text-shadow: var(--glow); }
    nav .links a::after {
      content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px;
      background: var(--accent); transition: width 0.3s; box-shadow: var(--glow);
    }
    nav .links a:hover::after { width: 100%; }

    /* Hero */
    .hero { text-align: center; padding: 80px 0 50px; }
    .hero h1 {
      font-size: 3rem; font-weight: 900; margin-bottom: 16px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 50%, var(--accent3) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; animation: shimmer 3s ease-in-out infinite alternate;
      text-shadow: none;
    }
    @keyframes shimmer {
      0% { filter: brightness(1); }
      100% { filter: brightness(1.3); }
    }
    .hero p {
      font-size: 1.15rem; color: var(--muted); max-width: 500px; margin: 0 auto;
      border: 1px solid var(--border); display: inline-block;
      padding: 8px 24px; border-radius: 50px;
      background: rgba(0,255,196,0.03);
    }

    /* Post cards */
    .post-list { padding: 10px 0 50px; }
    .post-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 32px; margin-bottom: 24px;
      backdrop-filter: blur(20px); transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
      position: relative; overflow: hidden;
    }
    .post-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0; transition: opacity 0.4s;
    }
    .post-card:hover {
      border-color: rgba(0,255,196,0.4);
      box-shadow: var(--glow); transform: translateY(-4px);
    }
    .post-card:hover::before { opacity: 1; }
    .post-card h2 { font-size: 1.4rem; margin-bottom: 10px; }
    .post-card h2 a {
      color: #fff; text-decoration: none;
      transition: all 0.3s;
    }
    .post-card h2 a:hover {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .post-meta { font-size: 0.85rem; color: var(--muted); margin-bottom: 12px; display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
    .tag {
      background: rgba(0,255,196,0.1); color: var(--accent);
      padding: 3px 12px; border-radius: 50px; font-size: 0.78rem;
      border: 1px solid rgba(0,255,196,0.2);
    }
    .excerpt { color: var(--muted); font-size: 0.95rem; line-height: 1.7; }
    .read-more {
      display: inline-block; margin-top: 14px; color: var(--accent); font-size: 0.9rem;
      text-decoration: none; font-weight: 600; transition: all 0.3s;
      padding: 6px 0; border-bottom: 1px solid transparent;
    }
    .read-more:hover { border-bottom-color: var(--accent); text-shadow: var(--glow); }

    /* Pagination */
    .pagination { text-align: center; padding: 20px 0 60px; display: flex; justify-content: center; align-items: center; gap: 28px; }
    .pagination a {
      color: var(--accent); text-decoration: none; font-weight: 600;
      padding: 10px 24px; border: 1px solid var(--border); border-radius: 50px;
      transition: all 0.3s; background: rgba(0,255,196,0.05);
    }
    .pagination a:hover { box-shadow: var(--glow); border-color: var(--accent); background: rgba(0,255,196,0.1); }
    .page-info { color: var(--muted); font-size: 0.9rem; }

    /* Post page */
    article.post { max-width: var(--max-w); margin: 0 auto; padding: 40px 24px; }
    article.post .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--muted); text-decoration: none; font-size: 0.9rem;
      margin-bottom: 30px; transition: color 0.3s; padding: 8px 16px;
      border: 1px solid var(--border); border-radius: 50px;
    }
    article.post .back-link:hover { color: var(--accent); border-color: var(--accent); }
    article.post h1 {
      font-size: 2.2rem; margin-bottom: 16px;
      background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; line-height: 1.3;
    }
    article.post .content { margin-top: 36px; font-size: 1.05rem; line-height: 2; }
    article.post .content h2 {
      font-size: 1.5rem; margin: 40px 0 16px; color: var(--accent);
      border-left: 3px solid var(--accent); padding-left: 16px;
    }
    article.post .content h3 { font-size: 1.2rem; margin: 28px 0 10px; color: var(--accent2); }
    article.post .content p { margin-bottom: 18px; }
    article.post .content a { color: var(--accent); text-decoration: underline; text-underline-offset: 4px; }
    article.post .content ul, article.post .content ol { margin: 14px 0 14px 28px; }
    article.post .content li { margin-bottom: 8px; }
    article.post .content blockquote {
      border-left: 4px solid var(--accent); padding: 16px 20px;
      margin: 24px 0; background: rgba(0,255,196,0.05); border-radius: 0 var(--radius) var(--radius) 0;
      color: var(--accent); font-style: italic;
    }
    article.post .content code {
      background: rgba(108,92,231,0.2); padding: 3px 8px; border-radius: 4px;
      font-size: 0.9em; color: var(--accent2);
    }
    article.post .content pre {
      background: rgba(0,0,0,0.5); padding: 24px; border-radius: var(--radius);
      overflow-x: auto; margin: 20px 0; font-size: 0.9rem; line-height: 1.7;
      border: 1px solid var(--border);
    }
    article.post .content pre code { background: none; padding: 0; color: var(--accent); }
    article.post .content hr {
      border: none; height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 36px 0;
    }
    article.post .content table {
      width: 100%; border-collapse: collapse; margin: 20px 0;
    }
    article.post .content th {
      background: rgba(0,255,196,0.1); color: var(--accent); padding: 12px 16px;
      text-align: left; border: 1px solid var(--border);
    }
    article.post .content td { padding: 10px 16px; border: 1px solid var(--border); }

    /* About */
    .about-page { max-width: var(--max-w); margin: 0 auto; padding: 60px 24px; }
    .about-page h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 24px;
    }
    .about-page p { margin-bottom: 16px; font-size: 1.05rem; color: var(--muted); line-height: 2; }

    footer {
      text-align: center; padding: 40px 0; color: var(--muted); font-size: 0.85rem;
      border-top: 1px solid var(--border); margin-top: 40px; position: relative; z-index: 1;
    }

    @media (max-width: 640px) {
      .hero { padding: 50px 0 30px; }
      .hero h1 { font-size: 1.8rem; }
      .post-card { padding: 22px; }
      article.post h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <a href="/" class="logo">{{ site.title }}</a>
      <div class="links">
        <a href="/">首页</a>
        <a href="/about/">关于</a>
      </div>
    </nav>
  </div>

  {{ content }}

  <footer>
    <div class="container">
      <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}. Powered by GitHub Pages & Jekyll.</p>
    </div>
  </footer>
</body>
</html>
