<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  {% feed_meta %}
  {% seo %}
  <style>
    :root {
      --bg: #fafafa; --card: #fff; --border: #e5e5e5;
      --text: #1a1a2e; --muted: #6b7280; --accent: #16213e;
      --link: #0f3460; --tag-bg: #e8f4f8; --tag-text: #0f3460;
      --radius: 8px; --max-w: 800px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", serif;
      line-height: 1.8; min-height: 100vh;
    }
    .container { max-width: var(--max-w); margin: 0 auto; padding: 0 20px; }

    nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 20px 0; border-bottom: 1px solid var(--border); flex-wrap: wrap;
    }
    nav .logo { font-size: 1.3rem; font-weight: 700; color: var(--accent); text-decoration: none; }
    nav .links { display: flex; gap: 24px; }
    nav .links a { color: var(--muted); text-decoration: none; font-size: 0.95rem; transition: color 0.2s; }
    nav .links a:hover { color: var(--link); }

    .hero { text-align: center; padding: 60px 0 40px; }
    .hero h1 { font-size: 2.4rem; font-weight: 800; color: var(--accent); margin-bottom: 8px; }
    .hero p { font-size: 1.1rem; color: var(--muted); }

    .post-list { padding: 20px 0 40px; }
    .post-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 28px; margin-bottom: 20px;
      transition: box-shadow 0.2s;
    }
    .post-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .post-card h2 { font-size: 1.35rem; margin-bottom: 8px; }
    .post-card h2 a { color: var(--accent); text-decoration: none; }
    .post-card h2 a:hover { color: var(--link); text-decoration: underline; }
    .post-meta { font-size: 0.88rem; color: var(--muted); margin-bottom: 10px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .tag {
      background: var(--tag-bg); color: var(--tag-text);
      padding: 2px 10px; border-radius: 12px; font-size: 0.8rem;
    }
    .excerpt { color: var(--muted); font-size: 0.95rem; line-height: 1.7; }
    .read-more { display: inline-block; margin-top: 10px; color: var(--link); font-size: 0.9rem; text-decoration: none; font-weight: 500; }
    .read-more:hover { text-decoration: underline; }

    .pagination { text-align: center; padding: 20px 0 60px; display: flex; justify-content: center; align-items: center; gap: 20px; }
    .pagination a { color: var(--link); text-decoration: none; font-weight: 500; }
    .page-info { color: var(--muted); font-size: 0.9rem; }

    /* Post page */
    article.post { max-width: var(--max-w); margin: 0 auto; padding: 40px 20px; }
    article.post h1 { font-size: 2rem; margin-bottom: 12px; color: var(--accent); }
    article.post .content { margin-top: 30px; font-size: 1.05rem; line-height: 1.9; }
    article.post .content h2 { font-size: 1.4rem; margin: 32px 0 12px; color: var(--accent); }
    article.post .content h3 { font-size: 1.15rem; margin: 24px 0 8px; }
    article.post .content p { margin-bottom: 16px; }
    article.post .content ul, article.post .content ol { margin: 12px 0 12px 24px; }
    article.post .content li { margin-bottom: 6px; }
    article.post .content blockquote {
      border-left: 4px solid var(--link); padding: 8px 16px;
      margin: 16px 0; background: #f0f4f8; border-radius: 0 var(--radius) var(--radius) 0;
    }
    article.post .content code {
      background: #f0f0f0; padding: 2px 6px; border-radius: 4px; font-size: 0.9em;
    }
    article.post .content pre {
      background: #1e1e2e; color: #cdd6f4; padding: 20px; border-radius: var(--radius);
      overflow-x: auto; margin: 16px 0; font-size: 0.9rem; line-height: 1.6;
    }
    article.post .content pre code { background: none; padding: 0; color: inherit; }

    .back-link { display: inline-block; margin-bottom: 20px; color: var(--muted); text-decoration: none; font-size: 0.9rem; }
    .back-link:hover { color: var(--link); }

    /* About */
    .about-page { max-width: var(--max-w); margin: 0 auto; padding: 40px 20px; }
    .about-page h1 { font-size: 1.8rem; margin-bottom: 20px; color: var(--accent); }

    footer { text-align: center; padding: 30px 0; color: var(--muted); font-size: 0.85rem; border-top: 1px solid var(--border); margin-top: 40px; }

    @media (max-width: 600px) {
      .hero h1 { font-size: 1.8rem; }
      .post-card { padding: 20px; }
      article.post h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <a href="/" class="logo">{{ site.title }}</a>
      <div class="links">
        <a href="/">首页</a>
        <a href="/about/">关于</a>
      </div>
    </nav>
  </div>

  {{ content }}

  <footer>
    <div class="container">
      <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}. Powered by GitHub Pages & Jekyll.</p>
    </div>
  </footer>
</body>
</html>
